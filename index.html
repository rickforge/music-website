<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Atmospheric Nordic-inspired music" />
    <meta name="author" content="Rickard Engström" />

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico" type="image/x-icon" />
    <title>Rickard Engström</title>

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
    />

    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <!-- Site Navigation -->
      <nav class="site-navigation">
        <a href="/" class="logo">Rickard Engström</a>
        <ul class="nav-menu">
          <li><a href="/" class="active-link">HOME</a></li>
          <li><a href="#">MUSIC</a></li>
          <li><a href="#">ABOUT</a></li>
          <li><a href="#">CONTACT</a></li>
        </ul>

        <!-- Touch menu -->
        <div class="hamburger">☰</div>
      </nav>
      <!-- Mobile Background blur -->
      <div class="menu-overlay"></div>
    </header>

    <!-- Hero section -->
    <div class="hero">
      <div class="hero-gradient-overlay"></div>

      <!-- Video box -->
      <div class="hero-video-box">
        <h1 class="hero-title">Super Epic Nordic Ambience</h1>
        <video id="video" src="videos/test.mp4" controls></video>
      </div>
    </div>

    <main>
      <!-- Music player -->
      <div class="music-player-box">
        <!-- Progress / Time -->
        <div class="progress-container">
          <input type="range" id="progress" value="0" min="0" max="100" />
        </div>

        <!-- Main music bar-->
        <div class="music-player-bar">
          <!-- Cover art + Track info-->
          <div class="track-info-box">
            <img src="awd" alt="Album cover" class="cover" />
            <div class="track-info">
              <div class="title"></div>
              <div class="artist"></div>
            </div>
          </div>

          <!-- Controls -->
          <div class="controls">
            <button id="prev"><i class="fa-solid fa-backward-step"></i></button>
            <button id="play"><i class="fa-solid fa-play"></i></button>
            <button id="next"><i class="fa-solid fa-forward-step"></i></button>
          </div>

          <!-- Volume controls -->
          <div class="volume-controls">
            <button id="mute"></button>
            <input type="range" id="volume" min="0" step="0.01" value="1" />
          </div>
        </div>

        <!-- Audio -->
        <audio id="audio"></audio>
      </div>
    </main>

    <footer class="footer">
      <!-- Footer top -->
      <div class="footer-top">
        <!-- Part 1-->
        <div class="footer-brand-social">
          <h2>Rickard Engström</h2>
          <p>Lorem, ipsum dolor sit amet consectetur</p>
          <ul>
            <li>
              <a href=""><i class="fa-brands fa-facebook"></i></a>
            </li>
            <li>
              <a href=""><i class="fa-brands fa-instagram"></i></a>
            </li>
            <li>
              <a href=""><i class="fa-brands fa-tiktok"></i></a>
            </li>
            <li>
              <a href=""><i class="fa-brands fa-x-twitter"></i></a>
            </li>
          </ul>
        </div>

        <!-- Part 2 -->
        <div>
          <nav>
            <ul>
              <li><a href="/" class="active-link">HOME</a></li>
              <li><a href="">MUSIC</a></li>
              <li><a href="">ABOUT</a></li>
              <li><a href="">CONTACT</a></li>
            </ul>
          </nav>
        </div>

        <!-- Part 3 -->
        <div>
          <nav>
            <ul>
              <li><a href="">COOKIE POLICY</a></li>
              <li><a href="">PRIVACY POLICY</a></li>
              <li><a href="">TERMS OF SERVICE</a></li>
            </ul>
          </nav>
        </div>
      </div>
      <!-- Footer bottom -->
      <div class="footer-bottom">
        <p>Copyright Rickard Engström</p>
      </div>
    </footer>
    <script src="script.js" defer></script>
  </body>
</html>
